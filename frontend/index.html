<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Assist.ant</title>

    <!-- PWA / iOS Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Assist.ant" />
    <meta name="theme-color" content="#1a1a2e" />
    <link rel="apple-touch-icon" href="/crest.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts: Syne (display/brand) + Outfit (body/UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Outfit', system-ui, sans-serif;
        background: #1a1a2e;
        color: #1a1508;
        /* Prevent overscroll bounce revealing the dark body bg on light content areas */
        overflow: hidden;
      }
      button { cursor: pointer; }

      /* ── CSS Keyframe Animations ─────────────────────────────────────── */

      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes pulseAmber {
        0%, 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        50%       { box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.2); }
      }

      @keyframes gotItPop {
        0%   { transform: scale(1); }
        35%  { transform: scale(1.4) rotate(-4deg); }
        65%  { transform: scale(0.88); }
        100% { transform: scale(1); }
      }

      @keyframes toastSlideUp {
        from { opacity: 0; transform: translateX(-50%) translateY(12px); }
        to   { opacity: 1; transform: translateX(-50%) translateY(0); }
      }

      /* Landing page entrance animations */
      .anim-fade-in       { animation: fadeIn    0.55s ease both; }
      .anim-fade-in-up    { animation: fadeInUp  0.45s ease both; }
      .anim-fade-in-up-d1 { animation: fadeInUp  0.45s ease 0.1s both; }
      .anim-fade-in-up-d2 { animation: fadeInUp  0.45s ease 0.2s both; }
      .anim-slide-up      { animation: slideUp   0.3s  ease both; }

      /* Bottom sheet modal animation */
      .modal-bottom-sheet { animation: slideUp 0.28s cubic-bezier(0.34, 1.1, 0.64, 1) both; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
